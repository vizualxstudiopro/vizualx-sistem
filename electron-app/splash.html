<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 420px;
      height: 256px;
      background: #0f1115;
      border: 1px solid rgba(207,168,97,0.22);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 80px rgba(0,0,0,0.75),
        0 0 60px rgba(207,168,97,0.06);
      animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: scale(0.93) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    /* Corner accent lines */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 32px; height: 32px;
      border-color: rgba(207,168,97,0.4);
      border-style: solid;
    }
    .card::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
      border-radius: 20px 0 0 0;
    }
    .card::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 20px 0;
    }

    /* Logo */
    .logo-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .logo-text {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: white;
      letter-spacing: 0.08em;
    }
    .logo-text .x { color: #cfa861; }

    .tagline {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #4b5563;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /* Loader bar */
    .bar-wrap {
      width: 168px;
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c5a059, #e8d28a, #c5a059);
      background-size: 200% 100%;
      border-radius: 2px;
      animation:
        barGrow   2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards,
        shimmer   1.4s linear infinite;
    }
    @keyframes barGrow {
      0%   { width: 0; }
      60%  { width: 80%; }
      100% { width: 100%; }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .version {
      position: absolute;
      bottom: 14px;
      font-family: system-ui, sans-serif;
      font-size: 10px;
      color: #1f2937;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- SVG Logo mark -->
    <div class="logo-row">
      <svg width="58" height="58" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <rect width="160" height="160" rx="22" fill="#161616"/>
        <g transform="translate(40,32)">
          <path d="M15 15 L40 40 L15 65 L28 65 L53 40 L28 15 Z" fill="#C5A059"/>
          <path d="M65 15 L40 40 L65 65 L52 65 L27 40 L52 15 Z" fill="#C5A059"/>
        </g>
      </svg>
      <div class="logo-text">VIZUAL<span class="x">X</span></div>
    </div>

    <div class="tagline">Admin Panel</div>

    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>

    <div class="version">v1.0.0</div>
  </div>
</body>
</html>
